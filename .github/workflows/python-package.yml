name: Python Package Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-n-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@f6771392095f09623e861d8c11432f81014a60f6 # v5.1.1
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build tools and build package
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        python -m build

    - name: Verify package build artifact
      run: |
        python -m twine check dist/*

    - name: Install build package and run tests
      run: |
        pip install dist/*.whl pytest
        python -m pytest tests/
